name: Deploy Agent

on:
  workflow_dispatch:
    inputs:
      gcp_project:
        description: "GCP Project ID"
        required: true
        default: ""
      gcp_region:
        description: "GCP Region (e.g. us-central1)"
        required: true
        default: "us-central1"
      gcs_bucket:
        description: "GCS Bucket name"
        required: true
        default: ""

jobs:
  deploy-agent:
    name: Deploy Agent (Knowledge IQ / enterpriseGPT)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ github.event.inputs.gcp_project }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          if [ -f agents/knowledge-iq/enterpriseGPT/requirements.txt ]; then
            pip install -r agents/knowledge-iq/enterpriseGPT/requirements.txt
          fi

      - name: Make script executable
        run: chmod +x deployment/deploy_agent.sh

      - name: Deploy agent stack
        env:
          GCP_PROJECT: ${{ github.event.inputs.gcp_project }}
          GCP_REGION: ${{ github.event.inputs.gcp_region }}
          GCS_BUCKET: ${{ github.event.inputs.gcs_bucket }}
        run: ./deployment/deploy_agent.sh
