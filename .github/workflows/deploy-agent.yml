name: Deploy Agent

on:
  workflow_dispatch:
    inputs:
      gcp_project:
        description: "GCP Project ID"
        required: true
        default: ""
      gcp_region:
        description: "GCP Region (e.g. us-central1)"
        required: true
        default: "us-central1"
      gcs_bucket:
        description: "GCS Bucket name"
        required: true
        default: ""

jobs:
  deploy-agent:
    name: Deploy Agent (Knowledge IQ / enterpriseGPT)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ github.event.inputs.gcp_project }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python dependencies
        working-directory: agents/knowledge-iq/enterpriseGPT
        run: uv sync --no-dev

      - name: Make script executable
        run: chmod +x deployment/deploy_agent.sh

      - name: Deploy agent stack
        env:
          GCP_PROJECT: ${{ github.event.inputs.gcp_project }}
          GCP_REGION: ${{ github.event.inputs.gcp_region }}
          GCS_BUCKET: ${{ github.event.inputs.gcs_bucket }}
          VIRTUAL_ENV: ${{ github.workspace }}/agents/knowledge-iq/enterpriseGPT/.venv
          PATH: ${{ github.workspace }}/agents/knowledge-iq/enterpriseGPT/.venv/bin:${{ env.PATH }}
        run: ./deployment/deploy_agent.sh
