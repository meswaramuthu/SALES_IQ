name: Deploy Cloud Run

on:
  workflow_dispatch:
    inputs:
      gcp_project:
        description: "GCP Project ID"
        required: true
        default: ""
      gcp_region:
        description: "GCP Region (e.g. us-central1)"
        required: true
        default: "us-central1"
      gcs_bucket:
        description: "GCS Bucket name"
        required: true
        default: ""
      artifact_repo:
        description: "Artifact Registry repo name only (e.g. knowledge-iq)"
        required: false
        default: "knowledge-iq"
      rag_corpus:
        description: "RAG Corpus resource path (from deploy-agent output, e.g. projects/979.../locations/us-west1/ragCorpora/...)"
        required: true
        default: ""
      cloudrun_flags:
        description: "Optional flags (--scheduler | --mcp). Leave blank to deploy all."
        required: false
        default: ""

jobs:
  deploy-cloudrun:
    name: Deploy Cloud Run Services
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ github.event.inputs.gcp_project }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ github.event.inputs.gcp_region }}-docker.pkg.dev --quiet

      - name: Make script executable
        run: chmod +x deployment/deploy_cloudrun.sh

      - name: Deploy Cloud Run services
        env:
          GCP_PROJECT: ${{ github.event.inputs.gcp_project }}
          GCP_REGION: ${{ github.event.inputs.gcp_region }}
          GCS_BUCKET: ${{ github.event.inputs.gcs_bucket }}
          ARTIFACT_REPO: ${{ github.event.inputs.artifact_repo }}
          RAG_CORPUS: ${{ github.event.inputs.rag_corpus }}
          SYNC_STATE_GCS_URI: gs://${{ github.event.inputs.gcs_bucket }}/knowledge-iq/sync-state.json
          TOOLS_CONFIG_GCS_URI: gs://${{ github.event.inputs.gcs_bucket }}/knowledge-iq/tools_config.json
        run: ./deployment/deploy_cloudrun.sh ${{ github.event.inputs.cloudrun_flags }}
