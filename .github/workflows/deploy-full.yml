name: Deploy Full (Knowledge IQ)

on:
  workflow_dispatch:
    inputs:
      gcp_project:
        description: "GCP Project ID"
        required: true
        default: ""
      gcp_region:
        description: "GCP Region for Agent Engine"
        required: true
        default: "us-central1"
      gcs_bucket:
        description: "GCS Bucket name"
        required: true
        default: ""
      rag_corpus:
        description: "Existing RAG Corpus resource path (leave blank to create new)"
        required: false
        default: ""
      skip_infrastructure:
        description: "Skip Phase 1 (APIs + bucket setup)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_gemini_enterprise:
        description: "Skip Gemini Enterprise connector registration"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  deploy-full:
    name: Deploy Knowledge IQ Agent
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ github.event.inputs.gcp_project }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "google-cloud-aiplatform[adk,agent-engines]==1.153.1" \
            "google-adk==1.34.3" \
            "pydantic>=2.0" \
            "pydantic-settings>=2.8.1" \
            "google-cloud-storage>=2.0" \
            "google-auth>=2.36.0" \
            "google-auth-httplib2>=0.2.0" \
            "google-auth-oauthlib>=1.2.0" \
            "google-api-python-client>=2.0" \
            "PyGithub>=2.0" \
            "atlassian-python-api>=3.41.0" \
            "beautifulsoup4>=4.12.0" \
            "python-dotenv>=1.0.0" \
            "requests>=2.32.3" \
            "msal>=1.20.0"

      - name: Create stub for stratova-shared
        run: |
          mkdir -p agents/knowledge-iq/shared/src/stratova_shared
          touch agents/knowledge-iq/shared/src/stratova_shared/__init__.py
          cat > agents/knowledge-iq/shared/pyproject.toml << 'EOF'
          [project]
          name = "stratova-shared"
          version = "0.1.0"
          requires-python = ">=3.11"
          [build-system]
          requires = ["hatchling"]
          build-backend = "hatchling.build"
          [tool.hatch.build.targets.wheel]
          packages = ["src/stratova_shared"]
          EOF

      - name: Write .env file
        run: echo "${{ secrets.AGENT_ENV_FILE }}" > agents/knowledge-iq/enterpriseGPT/.env

      - name: Run deploy_full.py
        working-directory: agents/knowledge-iq/enterpriseGPT
        env:
          GOOGLE_CLOUD_PROJECT: ${{ github.event.inputs.gcp_project }}
          GOOGLE_CLOUD_LOCATION: ${{ github.event.inputs.gcp_region }}
        run: |
          ARGS="--project ${{ github.event.inputs.gcp_project }}"
          ARGS="$ARGS --location ${{ github.event.inputs.gcp_region }}"
          ARGS="$ARGS --bucket gs://${{ github.event.inputs.gcs_bucket }}"

          if [ -n "${{ github.event.inputs.rag_corpus }}" ]; then
            ARGS="$ARGS --corpus ${{ github.event.inputs.rag_corpus }}"
          fi

          if [ "${{ github.event.inputs.skip_infrastructure }}" = "true" ]; then
            ARGS="$ARGS --skip-infrastructure"
          fi

          if [ "${{ github.event.inputs.skip_gemini_enterprise }}" = "true" ]; then
            ARGS="$ARGS --skip-gemini-enterprise"
          fi

          python deploy/deploy_full.py $ARGS
